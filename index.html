<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lineart Tool</title>
<style>
body { text-align:center; font-family:sans-serif; background:#111; color:white; }
canvas { border:1px solid white; margin-top:10px; }
input[type=range]{ width:250px; }
.control { margin:10px; }
</style>
</head>
<body>

<h2>러프 정리 툴</h2>
<input type="file" id="upload"><br><br>

<div class="control">
밝기: <span id="bVal">0</span><br>
<input type="range" id="brightness" min="-100" max="100" value="0">
</div>

<div class="control">
대비: <span id="cVal">150</span><br>
<input type="range" id="contrast" min="0" max="300" value="150">
</div>

<div class="control">
임계값: <span id="tVal">150</span><br>
<input type="range" id="threshold" min="0" max="255" value="150">
</div>

<div class="control">
부드러움: <span id="sVal">1</span><br>
<input type="range" id="smooth" min="0" max="3" value="1">
</div>

<canvas id="canvas"></canvas>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const brightness = document.getElementById("brightness");
const contrast = document.getElementById("contrast");
const threshold = document.getElementById("threshold");
const smooth = document.getElementById("smooth");

const bVal = document.getElementById("bVal");
const cVal = document.getElementById("cVal");
const tVal = document.getElementById("tVal");
const sVal = document.getElementById("sVal");

let originalImage;

upload.addEventListener("change", function(e){
  const img = new Image();
  img.src = URL.createObjectURL(e.target.files[0]);
  img.onload = function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
    originalImage = ctx.getImageData(0,0,canvas.width,canvas.height);
    applyEffect();
  }
});

brightness.oninput = contrast.oninput = threshold.oninput = smooth.oninput = function(){
  bVal.textContent = brightness.value;
  cVal.textContent = contrast.value;
  tVal.textContent = threshold.value;
  sVal.textContent = smooth.value;
  applyEffect();
};

function blurImage(imgData, level){
  if(level == 0) return imgData;

  let w = imgData.width;
  let h = imgData.height;
  let data = imgData.data;
  let copy = new Uint8ClampedArray(data);

  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      for(let c=0;c<3;c++){
        let i = (y*w + x)*4 + c;
        let sum =
          copy[i] +
          copy[i-4] +
          copy[i+4] +
          copy[i-w*4] +
          copy[i+w*4];
        data[i] = sum / 5;
      }
    }
  }
  return imgData;
}

function applyEffect(){
  if(!originalImage) return;

  let imgData = new ImageData(
    new Uint8ClampedArray(originalImage.data),
    originalImage.width,
    originalImage.height
  );

  let data = imgData.data;
  let b = parseInt(brightness.value);
  let c = parseInt(contrast.value);
  let t = parseInt(threshold.value);
  let s = parseInt(smooth.value);

  for(let i=0;i<data.length;i+=4){
    let gray = (data[i]*0.3 + data[i+1]*0.59 + data[i+2]*0.11);
    gray += b;
    gray = ((gray - 128) * (c/100)) + 128;
    data[i] = data[i+1] = data[i+2] = gray;
  }

  imgData = blurImage(imgData, s);

  data = imgData.data;

  for(let i=0;i<data.length;i+=4){
    let value = data[i] > t ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = value;
  }

  ctx.putImageData(imgData,0,0);
}
</script>

</body>
</html>
